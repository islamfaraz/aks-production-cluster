# =============================================================================
# GitHub Actions CD — AKS Production Cluster (Bicep + Docker + Helm)
# Deploys infra, pushes image to ACR, deploys Helm chart to AKS
# =============================================================================

name: CD — Deploy AKS Platform

on:
  workflow_run:
    workflows: ["CI — Build & Validate AKS Platform"]
    types: [completed]
    branches: [master, main]

permissions:
  contents: read
  id-token: write

env:
  ACR_NAME: acraksprod
  IMAGE_NAME: sample-api
  AKS_RESOURCE_GROUP: rg-aks-prod
  AKS_CLUSTER_NAME: aks-prod-cluster

jobs:
  # ────────────────────────────────────────────
  # Job 1 — Deploy Infrastructure (Bicep)
  # ────────────────────────────────────────────
  deploy-infra:
    name: 🏗️ Deploy Infrastructure — DEV
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Download ARM Artifact
        uses: actions/download-artifact@v4
        with:
          name: bicep-arm-${{ github.event.workflow_run.run_number }}
          path: artifact/arm/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep — DEV
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ env.AKS_RESOURCE_GROUP }}-dev
          template: artifact/arm/main.json
          parameters: infra/parameters/dev.bicepparam
          deploymentName: aks-infra-dev-${{ github.run_number }}
          failOnStdErr: false

  # ────────────────────────────────────────────
  # Job 2 — Push Docker Image to ACR
  # ────────────────────────────────────────────
  push-image:
    name: 🐳 Push Image to ACR
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push to ACR
        uses: docker/build-push-action@v6
        with:
          context: src/SampleApi
          file: src/SampleApi/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

  # ────────────────────────────────────────────
  # Job 3 — Deploy Helm Chart to AKS (DEV)
  # ────────────────────────────────────────────
  deploy-helm-dev:
    name: ⎈ Helm Deploy — DEV
    runs-on: ubuntu-latest
    needs: push-image
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AKS_RESOURCE_GROUP }}-dev \
            --name ${{ env.AKS_CLUSTER_NAME }}-dev \
            --overwrite-existing

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Helm Upgrade — DEV
        run: |
          helm upgrade --install sample-api helm/sample-api \
            --namespace default \
            --set image.repository=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }} \
            --wait --timeout 5m

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/sample-api --timeout=120s
          kubectl get pods -l app=sample-api

  # ────────────────────────────────────────────
  # Job 4 — Deploy to PRODUCTION (manual approval)
  # ────────────────────────────────────────────
  deploy-prod:
    name: 🟢 Deploy — PRODUCTION
    runs-on: ubuntu-latest
    needs: deploy-helm-dev
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep — PROD
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ env.AKS_RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: infra/parameters/prod.bicepparam
          deploymentName: aks-infra-prod-${{ github.run_number }}
          failOnStdErr: false

      - name: Get AKS Credentials — PROD
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AKS_RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Helm Upgrade — PROD
        run: |
          helm upgrade --install sample-api helm/sample-api \
            --namespace default \
            --set image.repository=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }} \
            --wait --timeout 5m

      - name: Post-deploy validation
        run: |
          echo "✅ PRODUCTION deployment complete"
          kubectl rollout status deployment/sample-api --timeout=120s
          kubectl get pods -l app=sample-api
